<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Plan — $63,000 Destroyed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #f0f0f0; font-family: 'DM Sans', sans-serif; padding: 20px 12px 40px; -webkit-tap-highlight-color: transparent; }
  .poster { max-width: 680px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 16px; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 4px; color: #f0f0f0; line-height: 1; }
  .subtitle { font-size: 13px; color: #999; margin-top: 6px; }
  .rule { font-size: 11px; color: #555; margin-top: 4px; font-style: italic; }
  .legend { margin-bottom: 14px; text-align: center; line-height: 2; }
  .legend-item { display: inline-block; margin: 2px 8px; font-size: 11px; color: #999; vertical-align: middle; }
  .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
  #grid-table { width: 100%; border-collapse: separate; border-spacing: 3px; table-layout: fixed; }
  #grid-table td { padding: 2px; }
  .sq-wrap { position: relative; width: 100%; padding-bottom: 100%; }
  .sq-inner { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 4px; cursor: pointer; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center; }
  .progress-section { margin-top: 16px; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; gap: 10px; }
  .progress-bar-wrap { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; height: 8px; background: #222; border-radius: 4px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.1); }
  .progress-bar-fill { height: 100%; background: #1D9E75; border-radius: 4px; width: 0%; -webkit-transition: width 0.4s; transition: width 0.4s; }
  .progress-label { font-size: 12px; color: #999; white-space: nowrap; }
  .progress-pct { font-size: 13px; font-weight: 500; color: #f0f0f0; min-width: 36px; text-align: right; }
  .stats-row { display: -webkit-box; display: -webkit-flex; display: flex; gap: 8px; margin-top: 12px; }
  .stat-card { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; background: #1a1a1a; border-radius: 10px; padding: 10px 6px; text-align: center; border: 0.5px solid rgba(255,255,255,0.1); }
  .stat-label { font-size: 10px; color: #999; margin-bottom: 3px; }
  .stat-value { font-size: 18px; font-weight: 500; color: #f0f0f0; }
  .stat-sub { font-size: 10px; color: #555; margin-top: 1px; }
  .bottom-row { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between; margin-top: 12px; }
  .undo-btn, .reset-btn { font-size: 12px; color: #999; background: none; border: 0.5px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 7px 16px; cursor: pointer; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; }
  .celebration { display: none; text-align: center; padding: 12px 16px; margin-top: 12px; border-radius: 10px; font-size: 14px; font-weight: 500; background: rgba(29,158,117,0.15); color: #4cd9a8; border: 0.5px solid rgba(29,158,117,0.4); }
  .confirm-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; -webkit-box-align: center; align-items: center; -webkit-box-pack: center; justify-content: center; padding: 20px; }
  .confirm-overlay.show { display: -webkit-box; display: -webkit-flex; display: flex; }
  .confirm-box { background: #1a1a1a; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 24px 20px; max-width: 300px; width: 100%; text-align: center; }
  .confirm-box p { font-size: 14px; color: #999; margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns { display: -webkit-box; display: -webkit-flex; display: flex; gap: 10px; }
  .confirm-btns button { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; padding: 10px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; -webkit-appearance: none; }
  .btn-cancel { background: none; color: #999; border: 0.5px solid rgba(255,255,255,0.15); }
  .btn-confirm { background: #c0392b; color: #fff; border: none; }
</style>
</head>
<body>
<div class="poster">
  <div class="header">
    <div class="title">THE PLAN</div>
    <div class="subtitle">126 squares &nbsp;&middot;&nbsp; $500 each &nbsp;&middot;&nbsp; $63,000 destroyed</div>
    <div class="rule">Every square = $500 extra thrown at debt. Tap it when you earn it.</div>
  </div>
  <div class="legend" id="legend"></div>
  <table id="grid-table"><tbody id="grid-body"></tbody></table>
  <div id="celebration" class="celebration"></div>
  <div class="progress-section">
    <span class="progress-label">Progress</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="bar"></div></div>
    <span class="progress-pct" id="pct">0%</span>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Squares done</div><div class="stat-value" id="sq-done">0</div><div class="stat-sub">of 126</div></div>
    <div class="stat-card"><div class="stat-label">Destroyed</div><div class="stat-value" id="destroyed">$0</div><div class="stat-sub">extra principal</div></div>
    <div class="stat-card"><div class="stat-label">Remaining</div><div class="stat-value" id="remaining">$63,000</div><div class="stat-sub">to go</div></div>
  </div>
  <div class="bottom-row">
    <button class="undo-btn" onclick="undo()">&#8617; Undo last</button>
    <button class="reset-btn" onclick="confirmReset()">Reset all</button>
  </div>
</div>
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p>Reset everything? This clears all progress and cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm" onclick="doReset()">Yes, reset</button>
    </div>
  </div>
</div>
<script>
var CARDS = [
  { name: 'Chase Sapphire', balance: 946,   squares: 2,  color: '#378ADD', border: '#185FA5' },
  { name: 'Citi',           balance: 7741,  squares: 16, color: '#1D9E75', border: '#0F6E56' },
  { name: 'Wells Fargo',    balance: 11767, squares: 24, color: '#E24B4A', border: '#A32D2D' },
  { name: 'Capital One',    balance: 17270, squares: 35, color: '#7F77DD', border: '#534AB7' },
  { name: 'SW Personal',    balance: 6083,  squares: 13, color: '#D4537E', border: '#993556' },
  { name: 'SW Business',    balance: 1822,  squares: 4,  color: '#BA7517', border: '#854F0B' },
  { name: 'Chase Ink Biz',  balance: 8303,  squares: 17, color: '#639922', border: '#3B6D11' },
  { name: 'Discover',       balance: 7544,  squares: 15, color: '#EF9F27', border: '#BA7517' }
];
var COLS = 9;
var MILESTONES = {24:1,49:1,74:1,99:1,125:1};
var TOTAL = 126;
var STORAGE_KEY = 'debt_grid_v1';
var squareData = [];
var done = {};
var history = [];

function buildSquareData() {
  var arr = [];
  for (var ci = 0; ci < CARDS.length; ci++) {
    for (var s = 0; s < CARDS[ci].squares; s++) {
      arr.push({ cardIdx: ci, isLast: s === CARDS[ci].squares - 1 });
    }
  }
  return arr;
}

function save() {
  try { var k=[]; for(var i in done){if(done[i])k.push(i);} localStorage.setItem(STORAGE_KEY,JSON.stringify(k)); } catch(e){}
}

function load() {
  try { var d=localStorage.getItem(STORAGE_KEY); if(d){var a=JSON.parse(d);for(var i=0;i<a.length;i++){done[a[i]]=true;}} } catch(e){}
}

function buildGrid() {
  var tbody = document.getElementById('grid-body');
  tbody.innerHTML = '';
  var row = null;
  for (var i = 0; i < squareData.length; i++) {
    if (i % COLS === 0) { row = document.createElement('tr'); tbody.appendChild(row); }
    var sq = squareData[i];
    var card = CARDS[sq.cardIdx];
    var isDone = !!done[i];
    var isMilestone = !!MILESTONES[i];
    var td = document.createElement('td');
    td.style.padding = '2px';
    var wrap = document.createElement('div');
    wrap.className = 'sq-wrap';
    var inner = document.createElement('div');
    inner.className = 'sq-inner';
    inner.style.backgroundColor = isDone ? 'rgba(0,0,0,0.55)' : card.color;
    inner.style.border = '1.5px solid ' + ((isMilestone||sq.isLast) ? 'rgba(255,255,255,0.6)' : card.border);
    if (isDone) {
      var chk = document.createElement('span');
      chk.textContent = '\u2713';
      chk.style.cssText = 'color:#fff;font-size:13px;font-weight:bold;position:relative;z-index:2;';
      inner.appendChild(chk);
    } else if (isMilestone) {
      var star = document.createElement('span');
      star.textContent = '\u2605';
      star.style.cssText = 'position:absolute;top:1px;right:2px;font-size:8px;color:rgba(255,255,255,0.75);line-height:1;';
      inner.appendChild(star);
    }
    (function(idx){ inner.onclick = function(){ toggle(idx); }; })(i);
    wrap.appendChild(inner);
    td.appendChild(wrap);
    row.appendChild(td);
  }
  var rem = COLS - (squareData.length % COLS);
  if (rem < COLS && row) { for (var j=0;j<rem;j++){ row.appendChild(document.createElement('td')); } }
  updateStats();
}

function toggle(i) {
  if (done[i]) return;
  history.push(i); done[i] = true; save(); checkCardComplete(i); buildGrid();
}

function undo() {
  if (!history.length) return;
  var last = history.pop(); done[last] = false; save();
  document.getElementById('celebration').style.display = 'none';
  buildGrid();
}

function confirmReset() { document.getElementById('confirm-overlay').className = 'confirm-overlay show'; }
function closeConfirm() { document.getElementById('confirm-overlay').className = 'confirm-overlay'; }
function doReset() { done={}; history=[]; save(); closeConfirm(); document.getElementById('celebration').style.display='none'; buildGrid(); }

function checkCardComplete(idx) {
  if (!squareData[idx].isLast) return;
  var card = CARDS[squareData[idx].cardIdx];
  var cel = document.getElementById('celebration');
  cel.style.display = 'block';
  cel.textContent = '\ud83c\udf89 ' + card.name + ' is GONE. $' + card.balance.toLocaleString() + ' destroyed. On to the next one.';
  setTimeout(function(){ cel.style.display='none'; }, 7000);
}

function updateStats() {
  var count=0; for(var k in done){if(done[k])count++;}
  var pct = Math.round((count/TOTAL)*100);
  document.getElementById('bar').style.width = pct+'%';
  document.getElementById('pct').textContent = pct+'%';
  document.getElementById('sq-done').textContent = count;
  document.getElementById('destroyed').textContent = '$'+(count*500).toLocaleString();
  document.getElementById('remaining').textContent = '$'+((TOTAL-count)*500).toLocaleString();
}

function buildLegend() {
  var legend = document.getElementById('legend');
  for (var i=0;i<CARDS.length;i++) {
    var card=CARDS[i];
    var item=document.createElement('span'); item.className='legend-item';
    var dot=document.createElement('span'); dot.className='legend-dot';
    dot.style.backgroundColor=card.color; dot.style.border='1px solid '+card.border;
    var lbl=document.createElement('span'); lbl.textContent=card.name+' ('+card.squares+')';
    item.appendChild(dot); item.appendChild(lbl); legend.appendChild(item);
  }
}

squareData = buildSquareData();
load();
buildLegend();
buildGrid();
</script>
</body>
</html>
